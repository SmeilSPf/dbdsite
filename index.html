<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Те кого стоит знать</title>

<style>

body {
    margin: 0;
    color: white;
    font-family: Arial;
    text-align: center;

    /* ФОН */
    background-image: url("bg.webp");
    background-size: cover;
    background-attachment: fixed;
    background-position: center;

    /* нельзя копировать текст */
    user-select: none;
}

/* затемнение фона */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}


.gallery {
    display: grid;
    grid-template-columns: repeat(5, 140px);

    justify-content: center;   /* центр по горизонтали */
    justify-items: center;     /* центр внутри ячеек */

    gap: 15px;
}

.card {
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 8px;
}

.name {
    margin-top: 5px;
    font-size: 18px;
}


/* ОКНО С ИНФОЙ */

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);

    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
}

.modal img {
    width: 300px;
}

.close {
    cursor: pointer;
    color: red;
    font-size: 20px;
    margin-top: 10px;
}

</style>
</head>

<body>

<h1>Те кого стоит знать</h1>


<div class="gallery">

<div class="card"
onclick="openChar(
'images/bybba.webp',
'Буббаслав',
'Славный малый'
)">
<img src="images/bybba.webp">
<div class="name">Буббаслав</div>
</div>

<div class="card"
onclick="openChar(
'images/spina.webp',
'Спина',
'Спина на дрожжах'
)">
<img src="images/spina.webp">
<div class="name">Спина</div>
</div>

<div class="card"
onclick="openChar(
'images/trap.webp',
'Трап',
'Аим как у его батька когда пытается пьяным протиснуться в дверь'
)">
<img src="images/trap.webp">
<div class="name">Трап</div>
</div>

<div class="card"
onclick="openChar(
'images/nolife.webp',
'Не живет, а выживает',
'Часто пиздят родители кулаками'
)">
<img src="images/nolife.webp">
<div class="name">Не живет, а выживает</div>
</div>

<div class="card"
onclick="openChar(
'images/patriarx.webp',
'Патриарх',
'Патриарх Кирилл'
)">
<img src="images/patriarx.webp">
<div class="name">Патриарх</div>
</div>

<div class="card"
onclick="openChar(
'images/ebar.webp',
'Ебарь',
'Обычно зоофил'
)">
<img src="images/ebar.webp">
<div class="name">Ебарь</div>
</div>

<div class="card"
onclick="openChar(
'images/epstein.webp',
'Альберт Эпштейн',
'Не тот у кого есть остров'
)">
<img src="images/epstein.webp">
<div class="name">Альберт Эпштейн</div>
</div>

<div class="card"
onclick="openChar(
'images/svin.webp',
'Свин',
'Свин'
)">
<img src="images/svin.webp">
<div class="name">Свин</div>
</div>

<div class="card"
onclick="openChar(
'images/legioner.webp',
'Легионер',
'Скучный чел'
)">
<img src="images/legioner.webp">
<div class="name">Легионер</div>
</div>

<div class="card"
onclick="openChar(
'images/derevnya.webp',
'Деревня',
'Село'
)">
<img src="images/derevnya.webp">
<div class="name">Деревня</div>
</div>

<div class="card"
onclick="openChar(
'images/oni.webp',
'Они́',
'Сосёт кровь'
)">
<img src="images/oni.webp">
<div class="name">Они́</div>
</div>

<div class="card"
onclick="openChar(
'images/kseno.webp',
'Ксено',
'Милый пес, но не всегда'
)">
<img src="images/kseno.webp">
<div class="name">Ксено</div>
</div>

<div class="card"
onclick="openChar(
'images/dimacarbon.webp',
'Димакарбон',
'Дмитрий'
)">
<img src="images/dimacarbon.webp">
<div class="name">Димакарбон</div>
</div>

</div>



<!-- ОКНО -->

<div class="modal" id="modal">

<div class="modal-content">

<h2 id="charName"></h2>

<img id="charImg">

<p id="charInfo"></p>

<div class="close" onclick="closeChar()">Закрыть</div>

</div>

</div>



<script>

function openChar(img, name, info)
{
    document.getElementById("modal").style.display = "flex";

    document.getElementById("charImg").src = img;
    document.getElementById("charName").innerText = name;
    document.getElementById("charInfo").innerText = info;
}

function closeChar()
{
    document.getElementById("modal").style.display = "none";
}

</script>


</body>
</html>
